# Extent Spark Reporter
extent.reporter.spark.start=true

# Unique folder configuration (Grasshopper Adapter)
basefolder.name=Reports/Reporting/
basefolder.datetimepattern=ddMMyy-HH_mm
extent.reporter.spark.out=Index.html

# Screenshot configuration
screenshot.directory=Screenshots/
screenshot.relativetopath=true

# System Information
systeminfo.os=Windows
systeminfo.user=FrameworkUser
systeminfo.environment=QA
