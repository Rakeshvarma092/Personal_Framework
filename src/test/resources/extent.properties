# Enable Spark Reporter
extent.reporter.spark.start=true

# Base folder for unique reports per run
basefolder.name=Reporting/TestRun_
basefolder.datetimepattern=yyyy-MM-dd_HH-mm-ss
extent.reporter.spark.out=SparkReport.html

# Screenshot configuration
# Adapter will save screenshots in 'Reporting/TestRun_timestamp/Screenshots/'
screenshot.directory=Screenshots/
screenshot.relativetopath=true

# System Information
systeminfo.os=Windows
systeminfo.user=FrameworkUser
systeminfo.environment=QA
